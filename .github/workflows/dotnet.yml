# Build, test, and publish the TestConsoleApp .NET tool to GitHub Packages.
# Versioning is handled automatically by MinVer using git tags (no CI commits needed).
#
# To cut a release, trigger the Create Version Tag workflow via the GitHub Actions
# "Run workflow" UI (workflow_dispatch) instead of creating tags by hand. It will
# compute the next semantic version from Conventional Commits, push the tag, and
# then directly dispatch this workflow for that tag — no PAT required.
# Manually pushing a v* tag will also trigger this workflow.

name: .NET

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0  # Required for MinVer to walk git history and find version tags

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore -c Release

    - name: Upload build output
      uses: actions/upload-artifact@v6
      with:
        name: build-output
        path: |
          **/bin/Release
          **/obj

  test:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Download build output
      uses: actions/download-artifact@v4
      with:
        name: build-output
        path: .  # Restore artifact into workspace root, preserving bin/obj directory structure

    - name: Restore dependencies
      run: dotnet restore

    - name: Test
      run: dotnet test --no-build --verbosity normal -c Release --collect:"XPlat Code Coverage" --results-directory ./coverage

    - name: Generate coverage report
      run: |
        dotnet tool install --global dotnet-reportgenerator-globaltool
        reportgenerator -reports:"./coverage/**/coverage.cobertura.xml" -targetdir:"./coverage/report" -reporttypes:"HtmlInline;Cobertura;MarkdownSummaryGithub"

    - name: Write coverage summary to job summary
      run: cat ./coverage/report/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

    - name: Upload coverage report
      uses: actions/upload-artifact@v6
      with:
        name: coverage-report
        path: ./coverage/report

  publish:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-')
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0  # Required for MinVer to walk git history and find version tags

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Pack
      run: dotnet pack TestConsoleApp/TestConsoleApp.csproj --no-restore -c Release -o ./artifacts

    - name: Push to GitHub Packages
      run: >
        dotnet nuget push ./artifacts/*.nupkg
        --source "https://nuget.pkg.github.com/carlescs/index.json"
        --api-key ${{ secrets.GITHUB_TOKEN }}
        --skip-duplicate
