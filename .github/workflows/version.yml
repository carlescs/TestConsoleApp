# Automatically determines the next semantic version tag from commits since the last tag
# and pushes it, which in turn triggers the build + publish pipeline in dotnet.yml.
#
# Version bump rules (Conventional Commits):
#   BREAKING CHANGE in footer, or type! (e.g. feat!:)  →  major
#   feat:                                               →  minor
#   fix:, perf:, refactor:, chore:, docs:, …           →  patch
#
# The bump can also be overridden manually via the workflow_dispatch input.

name: Create Version Tag

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type (auto-detected from commits when set to "auto")'
        required: false
        type: choice
        options:
          - auto
          - patch
          - minor
          - major
        default: auto

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history required to walk tags

      - name: Get latest tag
        id: latest_tag
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 --match "v*" 2>/dev/null || echo "")
          echo "tag=${LATEST_TAG}" >> "$GITHUB_OUTPUT"
          if [ -z "${LATEST_TAG}" ]; then
            echo "No existing tag found — will start from v1.0.0"
          else
            echo "Latest tag: ${LATEST_TAG}"
          fi

      - name: Detect bump type from commits
        id: bump
        run: |
          MANUAL_BUMP="${{ inputs.bump }}"
          LATEST_TAG="${{ steps.latest_tag.outputs.tag }}"

          # Honor a manual override
          if [ "${MANUAL_BUMP}" != "auto" ] && [ -n "${MANUAL_BUMP}" ]; then
            echo "type=${MANUAL_BUMP}" >> "$GITHUB_OUTPUT"
            echo "Using manual bump: ${MANUAL_BUMP}"
            exit 0
          fi

          # Collect commit subjects (and footers) since the last tag
          if [ -z "${LATEST_TAG}" ]; then
            COMMITS=$(git log --pretty=format:"%B" HEAD)
          else
            COMMITS=$(git log --pretty=format:"%B" "${LATEST_TAG}..HEAD")
          fi

          if [ -z "${COMMITS}" ]; then
            echo "No commits since last tag — nothing to version."
            echo "type=none" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BUMP="patch"

          while IFS= read -r line; do
            # Breaking change: footer token (BREAKING CHANGE: or BREAKING-CHANGE:) or
            # exclamation-mark type anywhere in the subject (e.g. feat!:, feat(scope)!:)
            if echo "${line}" | grep -qE '(BREAKING[- ]CHANGE:|^[a-zA-Z]+(\([^)]*\))?!:)'; then
              BUMP="major"
              break
            fi
            # New feature
            if echo "${line}" | grep -qE '^feat(\([^)]*\))?:'; then
              BUMP="minor"
            fi
          done <<< "${COMMITS}"

          echo "type=${BUMP}" >> "$GITHUB_OUTPUT"
          echo "Detected bump type: ${BUMP}"

      - name: Compute new version
        id: version
        run: |
          BUMP_TYPE="${{ steps.bump.outputs.type }}"

          if [ "${BUMP_TYPE}" = "none" ]; then
            echo "No version bump needed — skipping tag creation."
            exit 0
          fi

          LATEST_TAG="${{ steps.latest_tag.outputs.tag }}"

          if [ -z "${LATEST_TAG}" ]; then
            CURRENT="1.0.0"
          else
            CURRENT="${LATEST_TAG#v}"
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "${CURRENT}"

          case "${BUMP_TYPE}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "version=${NEW_TAG}" >> "$GITHUB_OUTPUT"
          echo "New version tag: ${NEW_TAG}"

      - name: Create and push tag
        if: steps.version.outputs.version != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"
          echo "✅ Created and pushed tag: ${{ steps.version.outputs.version }}"

      - name: Summary
        if: always()
        run: |
          BUMP_TYPE="${{ steps.bump.outputs.type }}"
          NEW_TAG="${{ steps.version.outputs.version }}"

          if [ "${BUMP_TYPE}" = "none" ]; then
            echo "### ℹ️ No new tag created" >> "$GITHUB_STEP_SUMMARY"
            echo "There were no commits since the last tag." >> "$GITHUB_STEP_SUMMARY"
          elif [ -n "${NEW_TAG}" ]; then
            echo "### 🚀 New tag created: \`${NEW_TAG}\`" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
            echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
            echo "| Previous tag | \`${{ steps.latest_tag.outputs.tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
            echo "| New tag | \`${NEW_TAG}\` |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Bump type | \`${BUMP_TYPE}\` |" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "The [build and publish workflow](../actions/workflows/dotnet.yml) will be triggered automatically." >> "$GITHUB_STEP_SUMMARY"
          fi
